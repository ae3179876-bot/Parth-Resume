<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Projects | Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        .cursor-glow {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header-section h1 {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header-section p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .main-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.6s ease;
        }

        .user-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 32px 48px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .user-info .profession {
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .content-wrapper {
            padding: 48px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #3b82f6;
            padding-left: 18px;
        }

        .section-title i {
            color: #3b82f6;
        }

        .info-note {
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 28px;
            color: #92400e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .project-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
        }

        .remove-project-btn {
            background: #fee2e2;
            border: none;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .remove-project-btn:hover {
            background: #fecaca;
            transform: scale(0.98);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .tech-tag {
            display: inline-block;
            background: #e0e7ff;
            color: #1e40af;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 4px;
        }
        
        .tech-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .add-tech-btn {
            background: #e2e8f0;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .add-tech-btn:hover {
            background: #cbd5e1;
        }

        .error-border {
            border-color: #ef4444 !important;
        }

        .error-text {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .add-project-btn {
            background: white;
            border: 2px dashed #3b82f6;
            color: #3b82f6;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 16px;
            width: 100%;
            justify-content: center;
            font-size: 1rem;
        }

        .add-project-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 2px solid #e2e8f0;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: none;
            font-size: 0.95rem;
        }

        .nav-btn.back {
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-btn.back:hover {
            background: #e2e8f0;
            transform: translateX(-5px);
        }

        .nav-btn.next {
            background: #0f172a;
            color: white;
        }

        .nav-btn.next:hover {
            background: #1e293b;
            transform: translateX(5px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: #f1f5f9;
            border-radius: 24px;
            color: #64748b;
        }

        /* Word wrap fix for all text content */
        .project-card p,
        .project-card .project-description,
        .project-card .input-group textarea,
        .project-description {
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            max-width: 100%;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .header-section h1 { font-size: 1.8rem; }
            .user-banner { padding: 24px; flex-direction: column; text-align: center; }
            .content-wrapper { padding: 24px; }
            .bottom-nav { flex-direction: column; }
            .nav-btn { width: 100%; justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <div class="header-section">
        <h1><i class="fas fa-code-branch"></i> Projects</h1>
        <p>Showcase your best projects and technical work</p>
    </div>

    <div class="main-card">
        <div class="user-banner" id="userBanner">
            <div class="user-info">
                <h2 id="userName">Loading...</h2>
                <div class="profession">
                    <i class="fas fa-laptop-code"></i>
                    <span id="userProfession">-</span>
                </div>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="section-title">
                <i class="fas fa-folder-open"></i>
                <span>Your Projects Portfolio</span>
            </div>

            <div class="info-note">
                <i class="fas fa-info-circle" style="font-size: 1.2rem;"></i>
                <span>Project Name and Description are required. All other fields are optional.</span>
            </div>

            <div id="projectsContainer">
                <!-- Dynamic project cards will be injected here -->
            </div>

            <button class="add-project-btn" id="addProjectBtn">
                <i class="fas fa-plus-circle"></i> Add Project
            </button>

            <div class="bottom-nav">
                <button class="nav-btn back" onclick="goToCertification()">
                    <i class="fas fa-chevron-left"></i> Back to Certifications
                </button>
                <button class="nav-btn next" onclick="proceedToTemplate()">
                    Next: Choose Template <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span>Message</span>
</div>

<script>
    let userData = null;
    let projects = [];

    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    function loadUserData() {
        const storedData = localStorage.getItem('resumeUserData');
        if (storedData) {
            userData = JSON.parse(storedData);
        } else {
            const draftData = localStorage.getItem('resumeUserDraft');
            if (draftData) {
                userData = JSON.parse(draftData);
            } else {
                userData = { firstName: "Alex", surname: "Johnson", profession: "Developer" };
            }
        }
        displayUserInfo();
        loadProjectsFromStorage();
        renderProjects();
    }

    function displayUserInfo() {
        if (userData) {
            const fullName = `${userData.firstName || ''} ${userData.surname || ''}`.trim();
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${fullName || 'Candidate'}`;
            document.getElementById('userProfession').textContent = userData.profession || 'Developer';
        }
    }

    function loadProjectsFromStorage() {
        const saved = localStorage.getItem('userProjects');
        if (saved) {
            try {
                const allProjects = JSON.parse(saved);
                if (Array.isArray(allProjects)) {
                    projects = allProjects.filter(proj => 
                        proj && typeof proj === 'object' &&
                        proj.name && proj.name.trim() !== '' &&
                        proj.description && proj.description.trim() !== ''
                    );
                } else {
                    projects = [];
                }
            } catch(e) { 
                projects = []; 
            }
        }
        
        if (projects.length === 0) {
            projects = [{
                id: Date.now(),
                name: '',
                role: '',
                technologies: [],
                startDate: '',
                endDate: '',
                description: '',
                githubLink: '',
                liveLink: ''
            }];
        }
    }

    function saveProjectsToStorage() {
        const toSave = projects.filter(proj => 
            proj.name && proj.name.trim() !== '' &&
            proj.description && proj.description.trim() !== ''
        );
        localStorage.setItem('userProjects', JSON.stringify(toSave));
        console.log("Saved projects:", toSave);
    }

    function createEmptyProject() {
        return {
            id: Date.now() + Math.random(),
            name: '',
            role: '',
            technologies: [],
            startDate: '',
            endDate: '',
            description: '',
            githubLink: '',
            liveLink: ''
        };
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        if (!container) return;
        
        if (!projects || projects.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 12px; display: block;"></i><strong>No projects added yet</strong><br>Click the button above to add your projects.</div>`;
            return;
        }

        container.innerHTML = '';
        projects.forEach((project, index) => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.setAttribute('data-id', project.id);
            card.innerHTML = `
                <div class="project-header">
                    <span class="project-title"><i class="fas fa-code" style="margin-right: 8px;"></i> Project #${index + 1}</span>
                    <button type="button" class="remove-project-btn" onclick="removeProject(${project.id})"><i class="fas fa-trash-alt"></i> Remove</button>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Project Name *</label>
                        <input type="text" class="project-name" value="${escapeHtml(project.name || '')}" placeholder="e.g., E-commerce Website, Portfolio, Task Manager">
                        <div class="error-text name-error" style="display: none;">Project name is required</div>
                    </div>
                    <div class="input-group">
                        <label>Your Role</label>
                        <input type="text" class="project-role" value="${escapeHtml(project.role || '')}" placeholder="e.g., Lead Developer, UI Designer, Backend Engineer">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="month" class="project-startdate" value="${project.startDate || ''}">
                    </div>
                    <div class="input-group">
                        <label>End Date</label>
                        <input type="month" class="project-enddate" value="${project.endDate || ''}">
                    </div>
                </div>
                <div class="input-group">
                    <label>Technologies Used</label>
                    <div class="tech-input-group">
                        <input type="text" class="tech-input" placeholder="e.g., React, Node.js, MongoDB" style="flex: 1;">
                        <button type="button" class="add-tech-btn" onclick="addTechnology(this)"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    <div class="technologies-container" style="margin-top: 10px;">
                        ${project.technologies.map(tech => `<span class="tech-tag">${escapeHtml(tech)} <i class="fas fa-times-circle" style="cursor: pointer; margin-left: 6px;" onclick="removeTechnology(this, ${project.id}, '${escapeHtml(tech)}')"></i></span>`).join('')}
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>GitHub Repository Link</label>
                        <input type="url" class="project-github" value="${escapeHtml(project.githubLink || '')}" placeholder="https://github.com/username/project">
                    </div>
                    <div class="input-group">
                        <label>Live Demo Link</label>
                        <input type="url" class="project-live" value="${escapeHtml(project.liveLink || '')}" placeholder="https://yourproject.com">
                    </div>
                </div>
                <div class="input-group">
                    <label>Project Description *</label>
                    <textarea class="project-description" rows="4" placeholder="Describe what the project does, your key contributions, challenges overcome, and results achieved..." style="word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap;"></textarea>
                    <div class="error-text desc-error" style="display: none;">Description is required</div>
                </div>
            `;

            // Set description value separately to preserve line breaks
            const descTextareaElem = card.querySelector('.project-description');
            descTextareaElem.value = project.description || '';
            
            const nameInput = card.querySelector('.project-name');
            const nameError = card.querySelector('.name-error');
            const descTextarea = card.querySelector('.project-description');
            const descError = card.querySelector('.desc-error');
            const roleInput = card.querySelector('.project-role');
            const startDateInput = card.querySelector('.project-startdate');
            const endDateInput = card.querySelector('.project-enddate');
            const githubInput = card.querySelector('.project-github');
            const liveInput = card.querySelector('.project-live');

            const updateField = (field, value) => {
                const projId = parseInt(card.getAttribute('data-id'));
                const targetProj = projects.find(p => p.id === projId);
                if (targetProj) {
                    targetProj[field] = value;
                }
            };

            nameInput.addEventListener('input', (e) => {
                updateField('name', e.target.value);
                if (e.target.value.trim()) {
                    nameError.style.display = 'none';
                    nameInput.classList.remove('error-border');
                }
            });
            
            descTextarea.addEventListener('input', (e) => {
                updateField('description', e.target.value);
                if (e.target.value.trim()) {
                    descError.style.display = 'none';
                    descTextarea.classList.remove('error-border');
                }
            });
            
            roleInput.addEventListener('input', (e) => updateField('role', e.target.value));
            startDateInput.addEventListener('change', (e) => updateField('startDate', e.target.value));
            endDateInput.addEventListener('change', (e) => updateField('endDate', e.target.value));
            githubInput.addEventListener('input', (e) => updateField('githubLink', e.target.value));
            liveInput.addEventListener('input', (e) => updateField('liveLink', e.target.value));

            container.appendChild(card);
        });
    }

    function addTechnology(button) {
        const card = button.closest('.project-card');
        const techInput = card.querySelector('.tech-input');
        const tech = techInput.value.trim();
        if (!tech) return;
        
        const projId = parseInt(card.getAttribute('data-id'));
        const targetProj = projects.find(p => p.id === projId);
        if (targetProj && !targetProj.technologies.includes(tech)) {
            targetProj.technologies.push(tech);
            
            const techContainer = card.querySelector('.technologies-container');
            const techSpan = document.createElement('span');
            techSpan.className = 'tech-tag';
            techSpan.innerHTML = `${escapeHtml(tech)} <i class="fas fa-times-circle" style="cursor: pointer; margin-left: 6px;" onclick="removeTechnology(this, ${projId}, '${escapeHtml(tech)}')"></i>`;
            techContainer.appendChild(techSpan);
            techInput.value = '';
        }
    }

    function removeTechnology(element, projId, techName) {
        const targetProj = projects.find(p => p.id === projId);
        if (targetProj) {
            targetProj.technologies = targetProj.technologies.filter(t => t !== techName);
            element.closest('.tech-tag').remove();
        }
    }

    function removeProject(id) {
        if (projects.length === 1) {
            const projIndex = projects.findIndex(p => p.id === id);
            if (projIndex !== -1) {
                projects[projIndex] = {
                    id: Date.now(),
                    name: '',
                    role: '',
                    technologies: [],
                    startDate: '',
                    endDate: '',
                    description: '',
                    githubLink: '',
                    liveLink: ''
                };
                renderProjects();
                showToast("Cleared - please add project name and description", "info");
            }
            return;
        }
        projects = projects.filter(proj => proj.id !== id);
        renderProjects();
        showToast("Project removed", "success");
    }

    function proceedToTemplate() {
        const cards = document.querySelectorAll('.project-card');
        let hasValid = false;
        
        for (let card of cards) {
            const name = card.querySelector('.project-name').value.trim();
            const description = card.querySelector('.project-description').value.trim();
            const nameError = card.querySelector('.name-error');
            const descError = card.querySelector('.desc-error');
            const nameInput = card.querySelector('.project-name');
            const descTextarea = card.querySelector('.project-description');
            
            let cardValid = true;
            
            if (!name) {
                nameError.style.display = 'block';
                nameInput.classList.add('error-border');
                cardValid = false;
            } else {
                nameError.style.display = 'none';
                nameInput.classList.remove('error-border');
            }
            
            if (!description) {
                descError.style.display = 'block';
                descTextarea.classList.add('error-border');
                cardValid = false;
            } else {
                descError.style.display = 'none';
                descTextarea.classList.remove('error-border');
            }
            
            if (cardValid) {
                hasValid = true;
                const projId = parseInt(card.getAttribute('data-id'));
                const projIndex = projects.findIndex(p => p.id === projId);
                if (projIndex !== -1) {
                    projects[projIndex].name = name;
                    projects[projIndex].description = description;
                    projects[projIndex].role = card.querySelector('.project-role').value;
                    projects[projIndex].startDate = card.querySelector('.project-startdate').value;
                    projects[projIndex].endDate = card.querySelector('.project-enddate').value;
                    projects[projIndex].githubLink = card.querySelector('.project-github').value;
                    projects[projIndex].liveLink = card.querySelector('.project-live').value;
                }
            }
        }
        
        if (!hasValid) {
            showToast("Please fill Project Name and Description for at least one project", "error");
            return;
        }
        
        saveProjectsToStorage();
        showToast("Projects saved! Redirecting to template selection...", "success");
        setTimeout(() => {
            window.location.href = '/template-selection';
        }, 600);
    }

    function goToCertification() {
        saveProjectsToStorage();
        window.location.href = '/certification';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.querySelector('span').textContent = message;
        toast.style.background = type === 'error' ? '#ef4444' : (type === 'info' ? '#3b82f6' : '#10b981');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
            toast.style.background = '#10b981';
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addProjectBtn').addEventListener('click', () => {
        const newProject = createEmptyProject();
        projects.push(newProject);
        renderProjects();
        showToast("New project added", "success");
        setTimeout(() => {
            const container = document.getElementById('projectsContainer');
            if (container.lastChild) {
                container.lastChild.scrollIntoView({ behavior: 'smooth', block: 'start' });
                const nameInput = container.lastChild.querySelector('.project-name');
                if (nameInput) nameInput.focus();
            }
        }, 100);
    });

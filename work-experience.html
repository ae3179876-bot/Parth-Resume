<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Work Experience | Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        .cursor-glow {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header-section h1 {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header-section p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .main-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.6s ease;
        }

        .user-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 32px 48px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .user-info .profession {
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .content-wrapper {
            padding: 48px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #3b82f6;
            padding-left: 18px;
        }

        .section-title i {
            color: #3b82f6;
        }

        .experience-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .experience-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .exp-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
        }

        .remove-exp-btn {
            background: #fee2e2;
            border: none;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .remove-exp-btn:hover {
            background: #fecaca;
            transform: scale(0.98);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .add-experience-btn {
            background: white;
            border: 2px dashed #3b82f6;
            color: #3b82f6;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 16px;
            width: 100%;
            justify-content: center;
            font-size: 1rem;
        }

        .add-experience-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 2px solid #e2e8f0;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: none;
            font-size: 0.95rem;
        }

        .nav-btn.back {
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-btn.back:hover {
            background: #e2e8f0;
            transform: translateX(-5px);
        }

        .nav-btn.next {
            background: #0f172a;
            color: white;
        }

        .nav-btn.next:hover {
            background: #1e293b;
            transform: translateX(5px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: #f1f5f9;
            border-radius: 24px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s;
        }

        .empty-state:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }

        .optional-badge {
            font-size: 0.7rem;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
            margin-left: 12px;
            color: #475569;
            vertical-align: middle;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .header-section h1 { font-size: 1.8rem; }
            .user-banner { padding: 24px; flex-direction: column; text-align: center; }
            .content-wrapper { padding: 24px; }
            .bottom-nav { flex-direction: column; }
            .nav-btn { width: 100%; justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <div class="header-section">
        <h1><i class="fas fa-briefcase"></i> Work Experience</h1>
        <p>Showcase your professional journey and achievements <span style="font-size:0.9rem; background:rgba(255,255,255,0.2); padding:2px 10px; border-radius:30px; margin-left:8px;">Optional Section</span></p>
    </div>

    <div class="main-card">
        <div class="user-banner" id="userBanner">
            <div class="user-info">
                <h2 id="userName">Loading...</h2>
                <div class="profession">
                    <i class="fas fa-user-tie"></i>
                    <span id="userProfession">-</span>
                </div>
            </div>
            <div class="action-buttons">
                
            </div>
        </div>

        <div class="content-wrapper">
            <div class="section-title">
                <i class="fas fa-history"></i>
                <span>Your Work History <span class="optional-badge">Optional — you can skip</span></span>
            </div>

            <div id="experiencesContainer">
                <!-- Dynamic experience cards will be injected here -->
            </div>

            <button class="add-experience-btn" id="addExpBtn">
                <i class="fas fa-plus-circle"></i> Add Another Experience
            </button>

            <div class="bottom-nav">
                <button class="nav-btn back" onclick="goToSummaryPage()">
                    <i class="fas fa-chevron-left"></i> Back to Summary
                </button>
                <button class="nav-btn next" onclick="validateAndProceed()">
                    Next: Education <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span>Message</span>
</div>

<script>
    let userData = null;
    let experiences = [];

    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    function loadUserData() {
        const storedData = localStorage.getItem('resumeUserData');
        if (storedData) {
            userData = JSON.parse(storedData);
        } else {
            const draftData = localStorage.getItem('resumeUserDraft');
            if (draftData) {
                userData = JSON.parse(draftData);
            } else {
                userData = { firstName: "Alex", surname: "Johnson", profession: "Software Engineer" };
            }
        }
        displayUserInfo();
        loadExperiencesFromStorage();
        renderExperiences();
    }

    function displayUserInfo() {
        if (userData) {
            const fullName = `${userData.firstName || ''} ${userData.surname || ''}`.trim();
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${fullName || 'Professional'}`;
            document.getElementById('userProfession').textContent = userData.profession || 'Professional';
        }
    }

    function loadExperiencesFromStorage() {
        const saved = localStorage.getItem('workExperiences');
        if (saved) {
            try {
                const parsedExperiences = JSON.parse(saved);
                if (Array.isArray(parsedExperiences) && parsedExperiences.length > 0) {
                    experiences = parsedExperiences;
                    console.log("Loaded experiences:", experiences);
                    return;
                }
            } catch(e) { 
                console.error("Error loading experiences:", e);
            }
        }
        
        // Agar koi data nahi hai, toh empty array rakho
        experiences = [];
    }

    function saveExperiencesToStorage() {
        // Saare experiences save karo (empty bhi, but filter karenge later)
        localStorage.setItem('workExperiences', JSON.stringify(experiences));
        console.log("Saved experiences to storage:", experiences);
        
        // Also save to a global resume data for template
        const resumeData = localStorage.getItem('resumeData') ? JSON.parse(localStorage.getItem('resumeData')) : {};
        resumeData.workExperiences = experiences;
        localStorage.setItem('resumeData', JSON.stringify(resumeData));
    }

    function createEmptyExperience() {
        return {
            id: Date.now(),
            jobTitle: '',
            company: '',
            location: '',
            startDate: '',
            endDate: '',
            currentlyWorking: false,
            description: ''
        };
    }

    function syncExperienceFromCard(card, expId) {
        const expIndex = experiences.findIndex(e => e.id === expId);
        if (expIndex !== -1) {
            experiences[expIndex].jobTitle = card.querySelector('.exp-jobtitle').value;
            experiences[expIndex].company = card.querySelector('.exp-company').value;
            experiences[expIndex].location = card.querySelector('.exp-location').value;
            experiences[expIndex].startDate = card.querySelector('.exp-startdate').value;
            experiences[expIndex].currentlyWorking = card.querySelector('.exp-currentwork').checked;
            if (!experiences[expIndex].currentlyWorking) {
                experiences[expIndex].endDate = card.querySelector('.exp-enddate').value;
            } else {
                experiences[expIndex].endDate = '';
            }
            experiences[expIndex].description = card.querySelector('.exp-description').value;
        }
    }

    function renderExperiences() {
        const container = document.getElementById('experiencesContainer');
        if (!container) return;
        
        if (!experiences || experiences.length === 0) {
            container.innerHTML = `<div class="empty-state" id="emptyStateClick">
                <i class="fas fa-briefcase" style="font-size: 3rem; margin-bottom: 12px; display: block; color: #94a3b8;"></i>
                <p style="font-size: 1rem; margin-bottom: 10px;">No work experience added yet.</p>
                <p style="font-size: 0.85rem; color: #3b82f6;"><i class="fas fa-plus-circle"></i> Click here or press "Add Experience" to add your work history</p>
                <p style="font-size: 0.8rem; margin-top: 10px; color: #64748b;">✨ All fields are optional — you can proceed without filling anything</p>
            </div>`;
            
            const emptyDiv = document.getElementById('emptyStateClick');
            if (emptyDiv) {
                emptyDiv.addEventListener('click', () => {
                    document.getElementById('addExpBtn').click();
                });
            }
            return;
        }

        container.innerHTML = '';
        experiences.forEach((exp, index) => {
            const card = document.createElement('div');
            card.className = 'experience-card';
            card.setAttribute('data-id', exp.id);
            card.innerHTML = `
                <div class="experience-header">
                    <span class="exp-title"><i class="fas fa-building" style="margin-right: 8px;"></i> Experience #${index + 1}</span>
                    <button type="button" class="remove-exp-btn" onclick="removeExperience(${exp.id})"><i class="fas fa-trash-alt"></i> Remove</button>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Job Title <span style="font-weight:normal; color:#64748b;">(optional)</span></label>
                        <input type="text" class="exp-jobtitle" value="${escapeHtml(exp.jobTitle || '')}" placeholder="e.g., Senior Frontend Developer">
                    </div>
                    <div class="input-group">
                        <label>Company / Organization <span style="font-weight:normal; color:#64748b;">(optional)</span></label>
                        <input type="text" class="exp-company" value="${escapeHtml(exp.company || '')}" placeholder="e.g., Google, Microsoft">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" class="exp-location" value="${escapeHtml(exp.location || '')}" placeholder="City, Country (optional)">
                    </div>
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="month" class="exp-startdate" value="${exp.startDate || ''}">
                    </div>
                    <div class="input-group">
                        <label>End Date</label>
                        <input type="month" class="exp-enddate" value="${exp.endDate || ''}" ${exp.currentlyWorking ? 'disabled' : ''}>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group" style="flex-direction: row; align-items: center; gap: 12px;">
                        <input type="checkbox" class="exp-currentwork" id="current_${exp.id}" ${exp.currentlyWorking ? 'checked' : ''}>
                        <label for="current_${exp.id}" style="margin:0;">I currently work here</label>
                    </div>
                </div>
                <div class="input-group">
                    <label>Job Description & Achievements</label>
                    <textarea class="exp-description" rows="3" placeholder="Describe your responsibilities, achievements, technologies used...">${escapeHtml(exp.description || '')}</textarea>
                </div>
            `;

            const currentCheckbox = card.querySelector('.exp-currentwork');
            const endDateInput = card.querySelector('.exp-enddate');
            
            currentCheckbox.addEventListener('change', (e) => {
                const isChecked = e.target.checked;
                endDateInput.disabled = isChecked;
                if (isChecked) {
                    endDateInput.value = '';
                }
                const expId = parseInt(card.getAttribute('data-id'));
                const foundExp = experiences.find(e => e.id === expId);
                if (foundExp) {
                    foundExp.currentlyWorking = isChecked;
                    if (isChecked) foundExp.endDate = '';
                    saveExperiencesToStorage(); // Auto-save on change
                }
            });

            // Auto-save on any input change
            const inputs = card.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const expId = parseInt(card.getAttribute('data-id'));
                    syncExperienceFromCard(card, expId);
                    saveExperiencesToStorage();
                });
            });

            container.appendChild(card);
        });
    }

    function removeExperience(id) {
        const expIndex = experiences.findIndex(e => e.id === id);
        if (expIndex !== -1) {
            experiences.splice(expIndex, 1);
            renderExperiences();
            saveExperiencesToStorage();
            showToast("Experience removed", "success");
        }
    }

    function validateAndProceed() {
        // Sync all current data from DOM before proceeding
        const cards = document.querySelectorAll('.experience-card');
        for (let card of cards) {
            const expId = parseInt(card.getAttribute('data-id'));
            syncExperienceFromCard(card, expId);
        }
        
        // Remove completely empty experiences (both jobTitle and company empty)
        const beforeFilter = experiences.length;
        experiences = experiences.filter(exp => {
            const hasJobTitle = exp.jobTitle && exp.jobTitle.trim() !== '';
            const hasCompany = exp.company && exp.company.trim() !== '';
            return hasJobTitle || hasCompany;
        });
        
        if (beforeFilter !== experiences.length) {
            renderExperiences();
        }
        
        // Date validation only if both dates are filled
        let dateValid = true;
        for (let exp of experiences) {
            if (exp.startDate && exp.endDate && !exp.currentlyWorking) {
                if (new Date(exp.endDate) < new Date(exp.startDate)) {
                    showToast("End date cannot be earlier than start date", "error");
                    dateValid = false;
                    break;
                }
            }
        }
        
        if (!dateValid) return;
        
        // Save final data
        saveExperiencesToStorage();
        
        let message = experiences.length > 0 ? 
            `${experiences.length} work experience(s) saved! Redirecting...` : 
            "No work experience added. Moving to next step...";
        
        showToast(message, "success");
        
        setTimeout(() => {
            window.location.href = '/education';
        }, 600);
    }

    function goToSummaryPage() {
        // Sync data before going back
        const cards = document.querySelectorAll('.experience-card');
        for (let card of cards) {
            const expId = parseInt(card.getAttribute('data-id'));
            syncExperienceFromCard(card, expId);
        }
        
        // Filter out empty ones
        experiences = experiences.filter(exp => {
            const hasJobTitle = exp.jobTitle && exp.jobTitle.trim() !== '';
            const hasCompany = exp.company && exp.company.trim() !== '';
            return hasJobTitle || hasCompany;
        });
        
        saveExperiencesToStorage();
        window.location.href = '/summary';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.querySelector('span').textContent = message;
        toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addExpBtn').addEventListener('click', () => {
        const newExp = createEmptyExperience();
        experiences.push(newExp);
        renderExperiences();
        saveExperiencesToStorage();
        showToast("New experience added (all fields optional)", "success");
        
        setTimeout(() => {
            const container = document.getElementById('experiencesContainer');
            if (container.lastChild && container.lastChild.scrollIntoView) {
                container.lastChild.scrollIntoView({ behavior: 'smooth', block: 'start' });
                const jobTitleInput = container.lastChild.querySelector('.exp-jobtitle');
                if (jobTitleInput) jobTitleInput.focus();
            }
        }, 100);
    });

    // Load all data on page load
    loadUserData();
</script>
</body>
</html>

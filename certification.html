<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Certifications | Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        .cursor-glow {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header-section h1 {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header-section p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .main-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.6s ease;
        }

        .user-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 32px 48px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .user-info .profession {
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .content-wrapper {
            padding: 48px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #3b82f6;
            padding-left: 18px;
        }

        .section-title i {
            color: #3b82f6;
        }

        .info-note {
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 28px;
            color: #92400e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cert-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .cert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cert-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
        }

        .remove-cert-btn {
            background: #fee2e2;
            border: none;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .remove-cert-btn:hover {
            background: #fecaca;
            transform: scale(0.98);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .error-border {
            border-color: #ef4444 !important;
        }

        .error-text {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .add-cert-btn {
            background: white;
            border: 2px dashed #3b82f6;
            color: #3b82f6;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 16px;
            width: 100%;
            justify-content: center;
            font-size: 1rem;
        }

        .add-cert-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 2px solid #e2e8f0;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: none;
            font-size: 0.95rem;
        }

        .nav-btn.back {
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-btn.back:hover {
            background: #e2e8f0;
            transform: translateX(-5px);
        }

        .nav-btn.next {
            background: #0f172a;
            color: white;
        }

        .nav-btn.next:hover {
            background: #1e293b;
            transform: translateX(5px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: #f1f5f9;
            border-radius: 24px;
            color: #64748b;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .header-section h1 { font-size: 1.8rem; }
            .user-banner { padding: 24px; flex-direction: column; text-align: center; }
            .content-wrapper { padding: 24px; }
            .bottom-nav { flex-direction: column; }
            .nav-btn { width: 100%; justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <div class="header-section">
        <h1><i class="fas fa-certificate"></i> Certifications</h1>
        <p>Add your professional certificates & credentials</p>
    </div>

    <div class="main-card">
        <div class="user-banner" id="userBanner">
            <div class="user-info">
                <h2 id="userName">Loading...</h2>
                <div class="profession">
                    <i class="fas fa-award"></i>
                    <span id="userProfession">-</span>
                </div>
            </div>
            <div class="action-buttons">
                
            </div>
        </div>

        <div class="content-wrapper">
            <div class="section-title">
                <i class="fas fa-medal"></i>
                <span>Your Certifications & Awards</span>
            </div>

            <div class="info-note">
                <i class="fas fa-info-circle" style="font-size: 1.2rem;"></i>
                <span>Certification Name is required. All other fields are optional.</span>
            </div>

            <div id="certificationsContainer">
                <!-- Dynamic certification cards will be injected here -->
            </div>

            <button class="add-cert-btn" id="addCertBtn">
                <i class="fas fa-plus-circle"></i> Add Certification
            </button>

            <div class="bottom-nav">
                <button class="nav-btn back" onclick="goToSkillsPage()">
                    <i class="fas fa-chevron-left"></i> Back to Skills
                </button>
                <button class="nav-btn next" onclick="proceedToProjects()">
                    Next: Projects <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span>Message</span>
</div>

<script>
    let userData = null;
    let certifications = [];

    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    function loadUserData() {
        const storedData = localStorage.getItem('resumeUserData');
        if (storedData) {
            userData = JSON.parse(storedData);
        } else {
            const draftData = localStorage.getItem('resumeUserDraft');
            if (draftData) {
                userData = JSON.parse(draftData);
            } else {
                userData = { firstName: "Alex", surname: "Johnson", profession: "Professional" };
            }
        }
        displayUserInfo();
        loadCertificationsFromStorage();
        renderCertifications();
    }

    function displayUserInfo() {
        if (userData) {
            const fullName = `${userData.firstName || ''} ${userData.surname || ''}`.trim();
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${fullName || 'Candidate'}`;
            document.getElementById('userProfession').textContent = userData.profession || 'Professional';
        }
    }

    function loadCertificationsFromStorage() {
        const saved = localStorage.getItem('userCertifications');
        if (saved) {
            try {
                const allCerts = JSON.parse(saved);
                if (Array.isArray(allCerts)) {
                    certifications = allCerts.filter(cert => 
                        cert && typeof cert === 'object' &&
                        cert.name && cert.name.trim() !== ''
                    );
                } else {
                    certifications = [];
                }
            } catch(e) { 
                certifications = []; 
            }
        }
        
        if (certifications.length === 0) {
            certifications = [{
                id: Date.now(),
                name: '',
                issuer: '',
                issueDate: '',
                expiryDate: '',
                credentialId: '',
                credentialUrl: '',
                description: ''
            }];
        }
    }

    function saveCertificationsToStorage() {
        const toSave = certifications.filter(cert => 
            cert.name && cert.name.trim() !== ''
        );
        localStorage.setItem('userCertifications', JSON.stringify(toSave));
        console.log("Saved certifications:", toSave);
    }

    function createEmptyCertification() {
        return {
            id: Date.now() + Math.random(),
            name: '',
            issuer: '',
            issueDate: '',
            expiryDate: '',
            credentialId: '',
            credentialUrl: '',
            description: ''
        };
    }

    function renderCertifications() {
        const container = document.getElementById('certificationsContainer');
        if (!container) return;
        
        if (!certifications || certifications.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-certificate" style="font-size: 3rem; margin-bottom: 12px; display: block;"></i><strong>No certifications added yet</strong><br>Click the button above to add your professional certificates.</div>`;
            return;
        }

        container.innerHTML = '';
        certifications.forEach((cert, index) => {
            const card = document.createElement('div');
            card.className = 'cert-card';
            card.setAttribute('data-id', cert.id);
            card.innerHTML = `
                <div class="cert-header">
                    <span class="cert-title"><i class="fas fa-trophy" style="margin-right: 8px;"></i> Certification #${index + 1}</span>
                    <button type="button" class="remove-cert-btn" onclick="removeCertification(${cert.id})"><i class="fas fa-trash-alt"></i> Remove</button>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Certification Name *</label>
                        <input type="text" class="cert-name" value="${escapeHtml(cert.name || '')}" placeholder="e.g., AWS Certified Solutions Architect">
                        <div class="error-text name-error" style="display: none;">Certification name is required</div>
                    </div>
                    <div class="input-group">
                        <label>Issuing Organization</label>
                        <input type="text" class="cert-issuer" value="${escapeHtml(cert.issuer || '')}" placeholder="e.g., Google, Microsoft, AWS">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Issue Date</label>
                        <input type="month" class="cert-issuedate" value="${cert.issueDate || ''}">
                    </div>
                    <div class="input-group">
                        <label>Expiry Date (if applicable)</label>
                        <input type="month" class="cert-expirydate" value="${cert.expiryDate || ''}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Credential ID / License Number</label>
                        <input type="text" class="cert-credid" value="${escapeHtml(cert.credentialId || '')}" placeholder="Optional">
                    </div>
                    <div class="input-group">
                        <label>Credential URL</label>
                        <input type="url" class="cert-url" value="${escapeHtml(cert.credentialUrl || '')}" placeholder="https://..." autocomplete="off">
                    </div>
                </div>
                <div class="input-group">
                    <label>Description / Skills Gained</label>
                    <textarea class="cert-description" rows="2" placeholder="Brief description of what you learned or achieved...">${escapeHtml(cert.description || '')}</textarea>
                </div>
            `;

            const nameInput = card.querySelector('.cert-name');
            const nameError = card.querySelector('.name-error');
            const issuerInput = card.querySelector('.cert-issuer');
            const issueDateInput = card.querySelector('.cert-issuedate');
            const expiryDateInput = card.querySelector('.cert-expirydate');
            const credIdInput = card.querySelector('.cert-credid');
            const urlInput = card.querySelector('.cert-url');
            const descTextarea = card.querySelector('.cert-description');

            const updateField = (field, value) => {
                const certId = parseInt(card.getAttribute('data-id'));
                const targetCert = certifications.find(c => c.id === certId);
                if (targetCert) {
                    targetCert[field] = value;
                }
            };

            nameInput.addEventListener('input', (e) => {
                updateField('name', e.target.value);
                if (e.target.value.trim()) {
                    nameError.style.display = 'none';
                    nameInput.classList.remove('error-border');
                }
            });
            issuerInput.addEventListener('input', (e) => updateField('issuer', e.target.value));
            issueDateInput.addEventListener('change', (e) => updateField('issueDate', e.target.value));
            expiryDateInput.addEventListener('change', (e) => updateField('expiryDate', e.target.value));
            credIdInput.addEventListener('input', (e) => updateField('credentialId', e.target.value));
            urlInput.addEventListener('input', (e) => updateField('credentialUrl', e.target.value));
            descTextarea.addEventListener('input', (e) => updateField('description', e.target.value));

            container.appendChild(card);
        });
    }

    function removeCertification(id) {
        if (certifications.length === 1) {
            const certIndex = certifications.findIndex(c => c.id === id);
            if (certIndex !== -1) {
                certifications[certIndex] = {
                    id: Date.now(),
                    name: '',
                    issuer: '',
                    issueDate: '',
                    expiryDate: '',
                    credentialId: '',
                    credentialUrl: '',
                    description: ''
                };
                renderCertifications();
                showToast("Cleared - please add certification name", "info");
            }
            return;
        }
        certifications = certifications.filter(cert => cert.id !== id);
        renderCertifications();
        showToast("Certification removed", "success");
    }

    function proceedToProjects() {
        // Get fresh values from DOM and validate
        const cards = document.querySelectorAll('.cert-card');
        let hasValid = false;
        
        for (let card of cards) {
            const name = card.querySelector('.cert-name').value.trim();
            const nameError = card.querySelector('.name-error');
            const nameInput = card.querySelector('.cert-name');
            
            if (!name) {
                nameError.style.display = 'block';
                nameInput.classList.add('error-border');
            } else {
                nameError.style.display = 'none';
                nameInput.classList.remove('error-border');
                hasValid = true;
                
                // Update the certifications array
                const certId = parseInt(card.getAttribute('data-id'));
                const certIndex = certifications.findIndex(c => c.id === certId);
                if (certIndex !== -1) {
                    certifications[certIndex].name = name;
                    certifications[certIndex].issuer = card.querySelector('.cert-issuer').value;
                    certifications[certIndex].issueDate = card.querySelector('.cert-issuedate').value;
                    certifications[certIndex].expiryDate = card.querySelector('.cert-expirydate').value;
                    certifications[certIndex].credentialId = card.querySelector('.cert-credid').value;
                    certifications[certIndex].credentialUrl = card.querySelector('.cert-url').value;
                    certifications[certIndex].description = card.querySelector('.cert-description').value;
                }
            }
        }
        
        if (!hasValid) {
            showToast("Please add at least one certification with name", "error");
            return;
        }
        
        saveCertificationsToStorage();
        showToast("Certifications saved! Redirecting to Projects page...", "success");
        setTimeout(() => {
            window.location.href = '/project';
        }, 600);
    }

    function goToSkillsPage() {
        saveCertificationsToStorage();
        window.location.href = '/skill';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.querySelector('span').textContent = message;
        toast.style.background = type === 'error' ? '#ef4444' : (type === 'info' ? '#3b82f6' : '#10b981');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
            toast.style.background = '#10b981';
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addCertBtn').addEventListener('click', () => {
        const newCert = createEmptyCertification();
        certifications.push(newCert);
        renderCertifications();
        showToast("New certification added", "success");
        setTimeout(() => {
            const container = document.getElementById('certificationsContainer');
            if (container.lastChild) {
                container.lastChild.scrollIntoView({ behavior: 'smooth', block: 'start' });
                const nameInput = container.lastChild.querySelector('.cert-name');
                if (nameInput) nameInput.focus();
            }
        }, 100);
    });

    loadUserData();
</script>
</body>
</html>

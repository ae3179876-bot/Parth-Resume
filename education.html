<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Education | Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        .cursor-glow {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header-section h1 {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header-section p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .main-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.6s ease;
        }

        .user-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 32px 48px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .user-info .profession {
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .content-wrapper {
            padding: 48px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #3b82f6;
            padding-left: 18px;
        }

        .section-title i {
            color: #3b82f6;
        }

        .education-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .education-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .edu-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
        }

        .remove-edu-btn {
            background: #fee2e2;
            border: none;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .remove-edu-btn:hover {
            background: #fecaca;
            transform: scale(0.98);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea, .input-group select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .error-border {
            border-color: #ef4444 !important;
        }

        .error-text {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .add-education-btn {
            background: white;
            border: 2px dashed #3b82f6;
            color: #3b82f6;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 16px;
            width: 100%;
            justify-content: center;
            font-size: 1rem;
        }

        .add-education-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 2px solid #e2e8f0;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: none;
            font-size: 0.95rem;
        }

        .nav-btn.back {
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-btn.back:hover {
            background: #e2e8f0;
            transform: translateX(-5px);
        }

        .nav-btn.next {
            background: #0f172a;
            color: white;
        }

        .nav-btn.next:hover {
            background: #1e293b;
            transform: translateX(5px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: #f1f5f9;
            border-radius: 24px;
            color: #64748b;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .header-section h1 { font-size: 1.8rem; }
            .user-banner { padding: 24px; flex-direction: column; text-align: center; }
            .content-wrapper { padding: 24px; }
            .bottom-nav { flex-direction: column; }
            .nav-btn { width: 100%; justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <div class="header-section">
        <h1><i class="fas fa-graduation-cap"></i> Education</h1>
        <p>Tell us about your academic background & qualifications</p>
    </div>

    <div class="main-card">
        <div class="user-banner" id="userBanner">
            <div class="user-info">
                <h2 id="userName">Loading...</h2>
                <div class="profession">
                    <i class="fas fa-user-graduate"></i>
                    <span id="userProfession">-</span>
                </div>
            </div>
            <div class="action-buttons">
                
            </div>
        </div>

        <div class="content-wrapper">
            <div class="section-title">
                <i class="fas fa-university"></i>
                <span>Educational Qualifications</span>
            </div>

            <div id="educationContainer">
                <!-- Dynamic education cards injected here -->
            </div>

            <button class="add-education-btn" id="addEduBtn">
                <i class="fas fa-plus-circle"></i> Add Another Education
            </button>

            <div class="bottom-nav">
                <button class="nav-btn back" onclick="goToWorkExpPage()">
                    <i class="fas fa-chevron-left"></i> Back to Work Experience
                </button>
                <button class="nav-btn next" onclick="validateAndProceed()">
                    Next: Skills <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span>Message</span>
</div>

<script>
    let userData = null;
    let educations = [];

    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    function loadUserData() {
        const storedData = localStorage.getItem('resumeUserData');
        if (storedData) {
            userData = JSON.parse(storedData);
        } else {
            const draftData = localStorage.getItem('resumeUserDraft');
            if (draftData) {
                userData = JSON.parse(draftData);
            } else {
                userData = { firstName: "Alex", surname: "Johnson", profession: "Professional" };
            }
        }
        displayUserInfo();
        loadEducationsFromStorage();
        renderEducations();
    }

    function displayUserInfo() {
        if (userData) {
            const fullName = `${userData.firstName || ''} ${userData.surname || ''}`.trim();
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${fullName || 'Candidate'}`;
            document.getElementById('userProfession').textContent = userData.profession || 'Student / Professional';
        }
    }

    function loadEducationsFromStorage() {
        // Clear any corrupted data first
        const saved = localStorage.getItem('userEducation');
        if (saved) {
            try {
                const allEdu = JSON.parse(saved);
                if (Array.isArray(allEdu)) {
                    educations = allEdu.filter(edu => 
                        edu && typeof edu === 'object' &&
                        edu.degree && edu.degree.trim() !== '' && 
                        edu.institution && edu.institution.trim() !== ''
                    );
                } else {
                    educations = [];
                }
            } catch(e) { 
                educations = []; 
            }
        }
        
        // Always ensure at least one empty card if no valid education exists
        if (educations.length === 0) {
            educations = [{
                id: Date.now(),
                degree: '',
                institution: '',
                fieldOfStudy: '',
                location: '',
                startYear: '',
                endYear: '',
                currentlyStudying: false,
                grade: '',
                description: ''
            }];
        }
    }

    function saveEducationsToStorage() {
        const toSave = educations.filter(edu => 
            edu.degree && edu.degree.trim() !== '' && 
            edu.institution && edu.institution.trim() !== ''
        );
        localStorage.setItem('userEducation', JSON.stringify(toSave));
        console.log("Saved to storage:", toSave);
    }

    function createEmptyEducation() {
        return {
            id: Date.now() + Math.random(),
            degree: '',
            institution: '',
            fieldOfStudy: '',
            location: '',
            startYear: '',
            endYear: '',
            currentlyStudying: false,
            grade: '',
            description: ''
        };
    }

    function renderEducations() {
        const container = document.getElementById('educationContainer');
        if (!container) return;
        
        if (!educations || educations.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-graduation-cap" style="font-size: 3rem; margin-bottom: 12px; display: block;"></i><strong>No education records added</strong><br>Click the button above to add your educational qualifications.</div>`;
            return;
        }

        container.innerHTML = '';
        educations.forEach((edu, index) => {
            const card = document.createElement('div');
            card.className = 'education-card';
            card.setAttribute('data-id', edu.id);
            card.innerHTML = `
                <div class="education-header">
                    <span class="edu-title"><i class="fas fa-book-open" style="margin-right: 8px;"></i> Education #${index + 1}</span>
                    <button type="button" class="remove-edu-btn" onclick="removeEducation(${edu.id})"><i class="fas fa-trash-alt"></i> Remove</button>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Degree / Certificate *</label>
                        <input type="text" class="edu-degree" value="${escapeHtml(edu.degree || '')}" placeholder="e.g., Bachelor of Technology, MBA, High School">
                        <div class="error-text degree-error" style="display: none;">Degree is required</div>
                    </div>
                    <div class="input-group">
                        <label>Institution / University *</label>
                        <input type="text" class="edu-institution" value="${escapeHtml(edu.institution || '')}" placeholder="e.g., Stanford University, IIT Delhi">
                        <div class="error-text institution-error" style="display: none;">Institution is required</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Field of Study</label>
                        <input type="text" class="edu-field" value="${escapeHtml(edu.fieldOfStudy || '')}" placeholder="e.g., Computer Science, Business Administration">
                    </div>
                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" class="edu-location" value="${escapeHtml(edu.location || '')}" placeholder="City, Country (optional)">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Start Year</label>
                        <select class="edu-startyear">
                            <option value="">Select Year</option>
                            ${generateYearOptions(edu.startYear)}
                        </select>
                    </div>
                    <div class="input-group">
                        <label>End Year</label>
                        <select class="edu-endyear">
                            <option value="">Select Year</option>
                            ${generateYearOptions(edu.endYear)}
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group" style="flex-direction: row; align-items: center; gap: 12px;">
                        <input type="checkbox" class="edu-currentstudy" id="current_${edu.id}" ${edu.currentlyStudying ? 'checked' : ''}>
                        <label for="current_${edu.id}" style="margin:0;">I am currently studying here</label>
                    </div>
                    <div class="input-group">
                        <label>Grade / CGPA (optional)</label>
                        <input type="text" class="edu-grade" value="${escapeHtml(edu.grade || '')}" placeholder="e.g., 8.5 CGPA, 85%, A+">
                    </div>
                </div>
                <div class="input-group">
                    <label>Additional Details / Achievements</label>
                    <textarea class="edu-description" rows="2" placeholder="Relevant coursework, achievements, thesis, activities...">${escapeHtml(edu.description || '')}</textarea>
                </div>
            `;

            const currentCheckbox = card.querySelector('.edu-currentstudy');
            const endYearSelect = card.querySelector('.edu-endyear');
            const degreeInput = card.querySelector('.edu-degree');
            const institutionInput = card.querySelector('.edu-institution');
            const degreeError = card.querySelector('.degree-error');
            const institutionError = card.querySelector('.institution-error');

            currentCheckbox.addEventListener('change', (e) => {
                const isChecked = e.target.checked;
                if (isChecked) {
                    endYearSelect.value = '';
                }
                const eduId = parseInt(card.getAttribute('data-id'));
                const foundEdu = educations.find(e => e.id === eduId);
                if (foundEdu) foundEdu.currentlyStudying = isChecked;
            });

            const fieldInput = card.querySelector('.edu-field');
            const locationInput = card.querySelector('.edu-location');
            const startYearSelect = card.querySelector('.edu-startyear');
            const endYearSelectField = card.querySelector('.edu-endyear');
            const gradeInput = card.querySelector('.edu-grade');
            const descTextarea = card.querySelector('.edu-description');

            const updateField = (field, value) => {
                const eduId = parseInt(card.getAttribute('data-id'));
                const targetEdu = educations.find(e => e.id === eduId);
                if (targetEdu) {
                    targetEdu[field] = value;
                }
            };

            degreeInput.addEventListener('input', (e) => {
                updateField('degree', e.target.value);
                if (e.target.value.trim()) {
                    degreeError.style.display = 'none';
                    degreeInput.classList.remove('error-border');
                }
            });
            institutionInput.addEventListener('input', (e) => {
                updateField('institution', e.target.value);
                if (e.target.value.trim()) {
                    institutionError.style.display = 'none';
                    institutionInput.classList.remove('error-border');
                }
            });
            fieldInput.addEventListener('input', (e) => updateField('fieldOfStudy', e.target.value));
            locationInput.addEventListener('input', (e) => updateField('location', e.target.value));
            startYearSelect.addEventListener('change', (e) => updateField('startYear', e.target.value));
            endYearSelectField.addEventListener('change', (e) => {
                if (!currentCheckbox.checked) updateField('endYear', e.target.value);
            });
            gradeInput.addEventListener('input', (e) => updateField('grade', e.target.value));
            descTextarea.addEventListener('input', (e) => updateField('description', e.target.value));

            container.appendChild(card);
        });
    }

    function generateYearOptions(selectedYear) {
        const currentYear = new Date().getFullYear();
        let options = '';
        for (let year = currentYear + 10; year >= 1950; year--) {
            const selected = (selectedYear == year) ? 'selected' : '';
            options += `<option value="${year}" ${selected}>${year}</option>`;
        }
        return options;
    }

    function removeEducation(id) {
        if (educations.length === 1) {
            const eduIndex = educations.findIndex(e => e.id === id);
            if (eduIndex !== -1) {
                educations[eduIndex] = {
                    id: Date.now(),
                    degree: '',
                    institution: '',
                    fieldOfStudy: '',
                    location: '',
                    startYear: '',
                    endYear: '',
                    currentlyStudying: false,
                    grade: '',
                    description: ''
                };
                renderEducations();
                showToast("Cleared - please add your education details", "info");
            }
            return;
        }
        educations = educations.filter(edu => edu.id !== id);
        renderEducations();
        showToast("Education record removed", "success");
    }

    function validateAndProceed() {
        // Get fresh values from DOM
        const cards = document.querySelectorAll('.education-card');
        let hasValid = false;
        let allErrors = [];
        
        for (let card of cards) {
            const degree = card.querySelector('.edu-degree').value.trim();
            const institution = card.querySelector('.edu-institution').value.trim();
            const degreeError = card.querySelector('.degree-error');
            const institutionError = card.querySelector('.institution-error');
            const degreeInput = card.querySelector('.edu-degree');
            const institutionInput = card.querySelector('.edu-institution');
            
            let cardValid = true;
            
            if (!degree) {
                degreeError.style.display = 'block';
                degreeInput.classList.add('error-border');
                cardValid = false;
            } else {
                degreeError.style.display = 'none';
                degreeInput.classList.remove('error-border');
            }
            
            if (!institution) {
                institutionError.style.display = 'block';
                institutionInput.classList.add('error-border');
                cardValid = false;
            } else {
                institutionError.style.display = 'none';
                institutionInput.classList.remove('error-border');
            }
            
            if (cardValid) {
                hasValid = true;
                // Update the educations array
                const eduId = parseInt(card.getAttribute('data-id'));
                const eduIndex = educations.findIndex(e => e.id === eduId);
                if (eduIndex !== -1) {
                    educations[eduIndex].degree = degree;
                    educations[eduIndex].institution = institution;
                    educations[eduIndex].fieldOfStudy = card.querySelector('.edu-field').value;
                    educations[eduIndex].location = card.querySelector('.edu-location').value;
                    educations[eduIndex].startYear = card.querySelector('.edu-startyear').value;
                    educations[eduIndex].currentlyStudying = card.querySelector('.edu-currentstudy').checked;
                    if (!educations[eduIndex].currentlyStudying) {
                        educations[eduIndex].endYear = card.querySelector('.edu-endyear').value;
                    } else {
                        educations[eduIndex].endYear = '';
                    }
                    educations[eduIndex].grade = card.querySelector('.edu-grade').value;
                    educations[eduIndex].description = card.querySelector('.edu-description').value;
                }
            }
        }
        
        if (!hasValid) {
            showToast("Please fill Degree and Institution for at least one education record", "error");
            return;
        }
        
        saveEducationsToStorage();
        showToast("Education saved! Redirecting to Skills page...", "success");
        setTimeout(() => {
            window.location.href = '/skill';
        }, 600);
    }

    function goToWorkExpPage() {
        saveEducationsToStorage();
        window.location.href = '/work-experience';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.querySelector('span').textContent = message;
        toast.style.background = type === 'error' ? '#ef4444' : (type === 'info' ? '#3b82f6' : '#10b981');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
            toast.style.background = '#10b981';
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addEduBtn').addEventListener('click', () => {
        const newEdu = createEmptyEducation();
        educations.push(newEdu);
        renderEducations();
        showToast("New education added", "success");
        setTimeout(() => {
            const container = document.getElementById('educationContainer');
            if (container.lastChild) {
                container.lastChild.scrollIntoView({ behavior: 'smooth', block: 'start' });
                const degreeInput = container.lastChild.querySelector('.edu-degree');
                if (degreeInput) degreeInput.focus();
            }
        }, 100);
    });

    loadUserData();
</script>
</body>
</html>

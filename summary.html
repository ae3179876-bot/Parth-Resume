<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Professional Summary | Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        .cursor-glow {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header-section h1 {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header-section p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .main-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.6s ease;
        }

        .user-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 32px 48px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-profile-area {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .profile-photo-container {
            position: relative;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 3px solid #3b82f6;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .profile-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-placeholder {
            font-size: 2.8rem;
            color: #94a3b8;
            background: #1e293b;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-icon-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #3b82f6;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            border: 2px solid white;
            cursor: pointer;
        }

        .user-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .user-info .profession {
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-info .profession i {
            color: #3b82f6;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .content-wrapper {
            padding: 48px;
        }

        .summary-section {
            margin-bottom: 48px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #3b82f6;
        }

        .summary-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 24px;
            padding: 32px;
            position: relative;
            border: 1px solid #e2e8f0;
        }

        .summary-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #334155;
            margin-bottom: 24px;
            min-height: 150px;
        }

        .summary-text.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #64748b;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .regenerate-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .regenerate-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.2);
        }

        .skills-section {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 2px solid #e2e8f0;
        }

        .skills-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .skill-tag {
            background: #eef2ff;
            color: #3b82f6;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .skill-tag:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid #e2e8f0;
        }

        .nav-btn {
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            font-size: 0.95rem;
        }

        .nav-btn.back {
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-btn.back:hover {
            background: #e2e8f0;
            transform: translateX(-4px);
        }

        .nav-btn.next {
            background: #0f172a;
            color: white;
        }

        .nav-btn.next:hover {
            background: #1e293b;
            transform: translateX(4px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        #profilePhotoInput {
            display: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            .header-section h1 {
                font-size: 1.8rem;
            }
            .user-banner {
                padding: 24px;
                flex-direction: column;
                text-align: center;
            }
            .user-profile-area {
                justify-content: center;
            }
            .content-wrapper {
                padding: 24px;
            }
            .summary-card {
                padding: 20px;
            }
            .bottom-nav {
                flex-direction: column;
                gap: 12px;
            }
            .nav-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="container">
    <div class="header-section">
        <h1><i class="fas fa-magic"></i> Professional Summary</h1>
        <p>AI-powered summary crafted for your success</p>
    </div>

    <div class="main-card">
        <div class="user-banner" id="userBanner">
            <div class="user-profile-area">
                <div class="profile-photo-container" id="profilePhotoContainer" onclick="triggerPhotoUpload()">
                    <div id="profilePhotoPreview" class="profile-placeholder">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="camera-icon-overlay">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <div class="user-info">
                    <h2 id="userName">Loading...</h2>
                    <div class="profession">
                        <i class="fas fa-briefcase"></i>
                        <span id="userProfession">-</span>
                        <i class="fas fa-map-marker-alt" style="margin-left: 12px;"></i>
                        <span id="userLocation">-</span>
                    </div>
                </div>
            </div>
            <div class="action-buttons">
                
            </div>
        </div>

        <div class="content-wrapper">
            <div class="summary-section">
                <div class="section-title">
                    <i class="fas fa-pen-fancy"></i>
                    <span>AI Generated Summary</span>
                </div>
                <div class="summary-card">
                    <div class="summary-text" id="summaryText">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            <span>Generating your professional summary using AI...</span>
                        </div>
                    </div>
                    <button class="regenerate-btn" onclick="regenerateSummary()">
                        <i class="fas fa-sync-alt"></i> Generate New Summary
                    </button>
                </div>
            </div>

            <div class="skills-section">
                <div class="section-title">
                    <i class="fas fa-rocket"></i>
                    <span>Suggested Key Skills</span>
                </div>
                <div class="skills-tags" id="skillsTags">
                    <span class="skill-tag">Leadership</span>
                    <span class="skill-tag">Problem Solving</span>
                    <span class="skill-tag">Communication</span>
                    <span class="skill-tag">Team Collaboration</span>
                    <span class="skill-tag">Project Management</span>
                </div>
            </div>

            <div class="bottom-nav">
                <button class="nav-btn back" onclick="goBackToUserPage()">
                    <i class="fas fa-chevron-left"></i> Back to Details
                </button>
                <button class="nav-btn next" onclick="goToWorkExperience()">
                    Next: Work Experience <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<input type="file" id="profilePhotoInput" accept="image/jpeg, image/png, image/jpg, image/webp">

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span>Summary generated successfully!</span>
</div>

<script>
    let currentSummary = '';
    let userData = null;
    let currentProfilePhotoData = null;

    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    function loadUserData() {
        const storedData = localStorage.getItem('resumeUserData');
        if (storedData) {
            userData = JSON.parse(storedData);
        } else {
            const draftData = localStorage.getItem('resumeUserDraft');
            if (draftData) {
                userData = JSON.parse(draftData);
            } else {
                userData = {
                    firstName: "Ghanshyam",
                    surname: "Chaudhari",
                    profession: "Retail Sales Associate",
                    city: "Jalgaon",
                    country: "India",
                    email: "ghanshamchaudhari2004@gmail.com",
                    phone: "+917709307593"
                };
                localStorage.setItem('resumeUserData', JSON.stringify(userData));
            }
        }
        
        const savedPhoto = localStorage.getItem('profilePhotoBase64');
        if (savedPhoto && savedPhoto !== 'null') {
            currentProfilePhotoData = savedPhoto;
            displayProfilePhoto(savedPhoto);
        }
        
        displayUserInfo();
        generateSummary();
    }

    function displayUserInfo() {
        if (userData) {
            const fullName = `${userData.firstName || ''} ${userData.surname || ''}`.trim();
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${fullName || 'User'}`;
            document.getElementById('userProfession').textContent = userData.profession || 'Professional';
            const location = `${userData.city || ''}, ${userData.country || ''}`.trim();
            document.getElementById('userLocation').textContent = location || 'Location not specified';
        }
    }

    function triggerPhotoUpload() {
        document.getElementById('profilePhotoInput').click();
    }

    function setupPhotoUpload() {
        const fileInput = document.getElementById('profilePhotoInput');
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const base64String = evt.target.result;
                    currentProfilePhotoData = base64String;
                    localStorage.setItem('profilePhotoBase64', base64String);
                    displayProfilePhoto(base64String);
                    showToast('Profile photo uploaded successfully! 📸', 'success');
                };
                reader.readAsDataURL(file);
            } else if (file) {
                showToast('Please select a valid image file (JPG, PNG)', 'error');
            }
        });
    }

    function displayProfilePhoto(base64Data) {
        const previewContainer = document.getElementById('profilePhotoPreview');
        if (base64Data && base64Data !== 'null') {
            previewContainer.innerHTML = `<img src="${base64Data}" alt="Profile" style="width:100%; height:100%; object-fit:cover;">`;
            previewContainer.classList.remove('profile-placeholder');
        } else {
            previewContainer.innerHTML = `<i class="fas fa-user"></i>`;
            previewContainer.classList.add('profile-placeholder');
        }
    }

    async function generateSummary() {
        const summaryDiv = document.getElementById('summaryText');
        summaryDiv.innerHTML = `
            <div class="loading">
                <div class="loading-spinner"></div>
                <span>AI is crafting your professional summary...</span>
            </div>
        `;

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const response = await fetch('/generate-summary', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ userData: userData }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            
            if (response.ok) {
                const result = await response.json();
                if (result.success && result.summary) {
                    currentSummary = result.summary;
                    summaryDiv.innerHTML = `<div style="white-space: pre-line;">${escapeHtml(currentSummary)}</div>`;
                    showToast('AI summary generated! ✨');
                    generateSuggestedSkills();
                    return;
                } else {
                    throw new Error("Invalid response");
                }
            } else {
                throw new Error("Server error");
            }
        } catch (error) {
            console.warn("Backend not available, using local AI fallback:", error);
            const localSummary = generateLocalSummary();
            currentSummary = localSummary;
            summaryDiv.innerHTML = `<div style="white-space: pre-line;">${escapeHtml(currentSummary)}</div>`;
            showToast('✨ Smart summary generated successfully!', 'success');
            generateSuggestedSkills();
        }
    }

    function generateLocalSummary() {
        const name = `${userData?.firstName || 'Candidate'} ${userData?.surname || ''}`.trim();
        const profession = userData?.profession || 'professional';
        
        return `${name} is a dedicated ${profession} with excellent customer service and communication skills. Proven track record of driving sales growth and building strong client relationships. Adept at inventory management, visual merchandising, and team collaboration. Committed to delivering exceptional customer experiences and achieving business targets.`;
    }

    function generateSuggestedSkills() {
        const profession = userData?.profession?.toLowerCase() || '';
        let skills = ['Customer Service', 'Sales', 'Communication', 'Team Collaboration', 'Inventory Management'];
        
        if (profession.includes('retail') || profession.includes('sales')) {
            skills = ['Customer Relationship Management', 'Sales Strategy', 'Visual Merchandising', 'Inventory Control', 'Point of Sale Systems', 'Team Leadership', 'Conflict Resolution'];
        }
        
        const skillsContainer = document.getElementById('skillsTags');
        skillsContainer.innerHTML = skills.slice(0, 7).map(skill => 
            `<span class="skill-tag">${escapeHtml(skill)}</span>`
        ).join('');
    }

    async function regenerateSummary() {
        await generateSummary();
    }

    function goToWorkExperience() {
        if (currentSummary) {
            localStorage.setItem('professionalSummaryText', currentSummary);
        }
        if (currentProfilePhotoData) {
            localStorage.setItem('profilePhotoBase64', currentProfilePhotoData);
        }
        localStorage.setItem('resumeUserData', JSON.stringify(userData));
        
        window.location.href = '/work-experience';
    }

    function goBackToUserPage() {
        if (currentProfilePhotoData) {
            localStorage.setItem('profilePhotoBase64', currentProfilePhotoData);
        }
        localStorage.setItem('resumeUserData', JSON.stringify(userData));
        window.location.href = '/userpage';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.querySelector('span').textContent = message;
        toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2800);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    setupPhotoUpload();
    loadUserData();
</script>
</body>
</html>
